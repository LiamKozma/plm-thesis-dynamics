# ==========================================
# EXPERIMENT CONFIGURATION (FAST DEBUG MODE)
# ==========================================

dataset: 'highdim'  

# --- 1. The Experimental Matrix (Single Execution) ---
n_trains: [500]      # Just one small pre-training set 
n_pools: [500]       # Just one small adaptation set 
shifts: [1.0]        # Just one shift magnitude 

# Statistical Variance Control
num_seeds: 1         # No replicates, strictly for testing pipeline flow 
starting_seed: 42            

# --- 2. Static Data Parameters ---
n_test: 100          # Shrunk from 1000 to save generation/evaluation time 

# --- 3. Training Hyperparameters ---
batch_size: 64               
learning_rate: 0.001         
base_epochs: 2       # Shrunk from 20. Two epochs guarantees the loop resets at least once 
adapt_epochs: 1              

# --- 4. Model Architecture ---
hidden_dim: 64       # Reduced from 512 for faster matrix multiplication 
dropout: 0.1
