# ==========================================
# EXPERIMENT: BASELINE EVALUATION (NO ADAPTATION)
# ==========================================
mode: 'eval'
dataset: 'highdim'  

# --- 1. The Experimental Matrix ---
n_trains: [1000]     
n_pools: [10]        # Kept tiny just to satisfy Nextflow's channel joining
shifts: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0] # Wide range to plot the crash

# Statistical Variance Control
num_seeds: 1         # Average across 3 runs for smooth error bars
starting_seed: 42            

# --- 2. Static Data Parameters ---
n_test: 1000         

# --- 3. Training Hyperparameters ---
batch_size: 64               
learning_rate: 0.001         
base_epochs: 20      # Full pre-training 
adapt_epochs: 1              

# --- 4. Model Architecture ---
hidden_dim: 512      
dropout: 0.1
