# config.yaml
dataset: "phylogenetic_gmm"
mode: "adapt" # or "eval"

# Execution Matrix
num_seeds: 3
starting_seed: 42
n_trains: [500, 1000]
n_pools: [1000, 5000]
shifts: [0.0, 0.5, 1.0, 2.0]  # 0.0 = Same sub-family, 2.0 = Distant orthologs

# GMM / Biological Simulation Parameters
dim: 1280          # Simulating ESM-2 embeddings
n_families: 20     # Number of distinct classes

# Model Hyperparameters
n_test: 1000
batch_size: 64
base_epochs: 30
learning_rate: 0.001
hidden_dim: 512
dropout: 0.1
