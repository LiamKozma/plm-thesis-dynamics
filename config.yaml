# ==========================================
# EXPERIMENT CONFIGURATION
# Objective: Quantifying the interaction between pre-training sample complexity, 
# adaptation sample complexity, and Wasserstein distance in OOD recovery.
# ==========================================

# --- 1. The Experimental Matrix (Independent Variables) ---
dataset: 'highdim'  # highdim or manifold           

# n_trains: Defines the pre-training sample complexity (Source Distribution). 
# INSTRUCTION: This accepts a list of ANY length. 
#   - Use 1 value (e.g., [1000]) for a static baseline.
#   - Use 2 values (e.g., [500, 5000]) to establish a linear trend.
#   - Use 3+ values (e.g., [500, 1000, 2000, 5000]) to plot non-linear curves 
#     and find diminishing returns in pre-training scale.
n_trains: [500, 1000, 5000]  

# n_pools: Defines the adaptation sample complexity (Target Distribution Reservoir).
# INSTRUCTION: This accepts a list of ANY length.
#   - Add more values to increase the x-axis resolution of your data scarcity matrix.
#   - Example of a high-resolution logarithmic scale: [500, 1000, 2000, 5000, 10000]
n_pools: [500, 2000, 5000]   

# shifts: The magnitude of the distribution shift, dictating the target Wasserstein distance.
# INSTRUCTION: This accepts a list of ANY length. 
#   - More values will create a smoother, more detailed final plot of 
#     Wasserstein Distance vs. Recovery Threshold.
#   - Example: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]
shifts: [0.5, 1.0, 1.5, 2.0] 

# Statistical Variance Control
# num_seeds: Defines the number of independent replicates for error estimation (e.g., 95% CI).
# INSTRUCTION: Change this to 1 for rapid pipeline testing, or 10+ for publication-ready error bars.
num_seeds: 5                 

# starting_seed: The base integer for deterministic random seed generation across replicates.
starting_seed: 42            

# --- 2. Static Data Parameters (Constants) ---
# n_test: The static, disjoint evaluation set drawn from the target distribution.
# 1000 samples ensures statistical significance and stability of the MSE/rBME metrics.
n_test: 1000                 

# --- 3. Training Hyperparameters ---
# batch_size: Defines the granularity of the adaptation tracking (x-axis resolution).
batch_size: 64               
learning_rate: 0.001         

# base_epochs: Epochs required for the foundational model to converge on the source distribution.
base_epochs: 20              

# adapt_epochs: Iterations over the adaptation reservoir. 
# Restricted to 1 to measure immediate sample efficiency during recovery, preventing target overfitting.
adapt_epochs: 1              

# --- 4. Model Architecture ---
hidden_dim: 512              
dropout: 0.1
